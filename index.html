<!DOCTYPE html>
<html lang="es">

<head>

<body>

    <div class="theme-toggle-container">
        <button id="theme-button">Cambiar Modo</button>
    </div>

    <a href="https://www.xoc.uam.mx" class="site-logo-container" rel="home">
        <img width="300" height="80" src="https://computo.xoc.uam.mx/archivos/conjunto-baseXoc.png" alt="Servicios de Cómputo UAM-X">
    </a>

    <ul class="header">
        <li>
            <script type="text/javascript">
                var meses = new Array("Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre");
                var f = new Date();
                document.write(f.getDate() + " de " + meses[f.getMonth()] + " de " + f.getFullYear());
            </script>
        </li>
        <li>
            <div id="reloj"></div>
        </li>
    </ul>

    <hr>

    <h1>Botón modo oscuro</h1>
    <p>Usa el botón en la esquina superior derecha para alternar el tema de toda la página.</p>

    <div class="card">
        <img src="./imagenes/git.jpg" alt="Programador" class="img">
        <p>Imagen de programador</p>
    </div>
